# OmniTerm: 빌드 후 GitHub Release에 DMG/앱 업로드
# 트리거: v* 태그 푸시, 또는 release 브랜치 푸시, 또는 수동 실행
name: Release

on:
  workflow_dispatch:
  push:
    # Run when a version tag is pushed (e.g. git push origin v0.1.6 from any branch)
    tags:
      - 'v*'
    # Or when code is pushed to the release branch
    branches:
      - release

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            name: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            name: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add Rust target (ensure std for cross-compile)
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'OmniTerm v__VERSION__'
          releaseBody: '다운로드 후 설치해서 사용하세요. macOS Apple Silicon은 macos-aarch64, Intel은 macos-x64, Windows는 windows-x64를 받으세요.'
          releaseDraft: false
          prerelease: false
          # 릴리스 제목·파일명에 버전 통일 (DMG·app.tar.gz 모두 [name]_[version]_[arch][ext])
          assetNamePattern: '[name]_[version]_[arch][ext]'
          args: ${{ matrix.args }}
