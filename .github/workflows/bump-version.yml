# main 브랜치에 푸시될 때마다 패치 버전을 자동으로 올리고 태그를 푸시합니다.
# 태그 푸시는 기존 Release 워크플로를 트리거해 빌드·릴리스를 실행합니다.
name: Bump Version

on:
  push:
    branches:
      - main

jobs:
  bump:
    # 버전 번호만 올리는 커밋은 다시 이 워크플로를 돌리지 않음
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Bump patch version
        id: bump
        run: |
          # package.json에서 현재 버전 읽기
          CURRENT=$(node -p "require('./package.json').version")
          # 패치 버전 올리기 (0.1.3 -> 0.1.4)
          NEW_VERSION=$(node -e "
            const [a,b,c] = '$CURRENT'.split('.').map(Number);
            console.log([a, b, c + 1].join('.'));
          ")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

          # package.json 업데이트
          node -e "
            const fs = require('fs');
            const p = require('./package.json');
            p.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # tauri.conf.json 업데이트
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(path, 'utf8'));
            c.version = '$NEW_VERSION';
            fs.writeFileSync(path, JSON.stringify(c, null, 2) + '\n');
          "

          # Cargo.toml 업데이트 (package.version 줄만 변경)
          sed -i.bak 's/^version = .*/version = "'"$NEW_VERSION"'"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

      - name: Update package-lock.json version
        run: npm install --package-lock-only

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git diff --staged --quiet || git commit -m "chore: release v${{ steps.bump.outputs.new }} [skip ci]"
          git push origin main

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new }}"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
